{% extends "base.html" %}

{% block content %}

<section class="map-page">

    <h1>Interactive UCSC Map</h1>

    <p>Discover the best places to study around campus.</p>

    <!-- Category filter -->
    <div class="filter-bar">
        <button class="filter-btn active" data-category="all">All</button>

        <button class="filter-btn" data-category="library">📚 Libraries</button>

        <button class="filter-btn" data-category="cafe">☕ Cafes</button>

        <button class="filter-btn" data-category="nature">🌳 Nature</button>

        <button class="filter-btn" data-category="computer lab">💻 Computer Labs</button>

        <button id="clear-filters">✖ Clear Filters</button>

    </div>

    <!-- Tags Filter -->
    <div class="tag-filter-bar">

        <button class="tag-btn" data-tag="WiFi">📶 WiFi</button>

        <button class="tag-btn" data-tag="Outlets">🔌 Outlets</button>

        <button class="tag-btn" data-tag="Quiet">🤫 Quiet</button>

        <button class="tag-btn" data-tag="Food">🍔 Food</button>

        <button class="tag-btn" data-tag="Study Rooms">📚 Study Rooms</button>

    </div>

    <button id="suggest-spot-btn">+ Suggest Spot</button>

    <div id="map"></div>    

    <div id="spot-sheet" class="spot-sheet hidden">

        <div class="sheet-handle"></div>

        <button id="close-info">✖</button>

        <div class="spot-header">

            <h2 id="spot-title"></h2>

            <button id="directions-button">📍 Directions</button>
        </div>

        <div class="spot-stats">

            <p id="spot-rating"></p>

            <p id="spot-likes"></p>

        </div>
        <button id="like-button">👍 Like</button>

        <div id="spot-tags"></div>

        <p id="spot-description"></p>

        <div id="spot-images"></div>

        <h3>Reviews</h3>
        <div id="spot-reviews"></div>

        <button id="write-review-btn">⭐ Write a Review</button>

    </div>

</section>

<div id="suggest-modal" class="suggest-modal">
    <div class="modal-content">
        <button id="close-modal">✖</button>

        <h2>Suggest a Study Spot</h2>

        <input id="spot-name-input" placeholder="Spot Name">

        <select id="spot-category-input">
            <option value="library">Library</option>
            <option value="cafe">Cafe</option>
            <option value="computer lab">Computer Lab</option>
            <option value="nature">Outdoor</option>
            <option value="other">Other</option>
        </select>

        <textarea id="spot-description-input" placeholder="Description"></textarea>

        <div class="modal-tags">
            <button class="modal-tag-btn" data-tag="WiFi">WiFi</button>
            <button class="modal-tag-btn" data-tag="Quiet">Quiet</button>
            <button class="modal-tag-btn" data-tag="Outlets">Outlets</button>
            <button class="modal-tag-btn" data-tag="Food">Food</button>
        </div>

        <h3>Upload Photos</h3>
        <input type="file"id="spot-images-upload" accept="image/*" multiple>
        <div id="image-preview"></div>

        <button id="select-location-btn">📍 Select Location on Map</button>
        <p id="selected-location">No location selected</p>
        
        <button id="modal-submit-btn">Submit</button>
    </div>
</div>


<!-- User Review -->
<div id="review-modal" class="suggest-modal">
    <div class="modal-content">
        <button id="close-review-modal">✖</button>
        <h2>Write a Review</h2>
        <label>Rating</label>

        <select id="review-rating">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
        </select>

        <textarea id="review-comment" placeholder="Share your experience..."></textarea>

        <button id="submit-review">Submit Review</button>
    </div>
</div>
{% endblock %}
